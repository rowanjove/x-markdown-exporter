<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 312px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .header img {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
    }

    .status.ok { background: rgba(0, 186, 124, 0.15); color: #00ba7c; }
    .status.no { background: rgba(244, 33, 46, 0.15); color: #f4212e; }
    .status.loading { background: rgba(29, 155, 240, 0.15); color: #1d9bf0; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .status span {
      min-width: 0;
      flex: 1;
    }

    .status-type {
      flex: 0 0 auto;
      max-width: 100%;
      padding: 3px 7px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #71767b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .mode-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .mode-btn {
      flex: 1;
      padding: 9px 6px;
      border: 1px solid #2f3336;
      border-radius: 10px;
      background: transparent;
      color: #8b98a5;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-align: center;
      line-height: 1.35;
    }

    .mode-btn:hover { border-color: #1d9bf0; color: #1d9bf0; }

    .mode-btn.active {
      background: rgba(29, 155, 240, 0.15);
      border-color: #1d9bf0;
      color: #1d9bf0;
    }

    .mode-desc {
      font-size: 11px;
      color: #71767b;
      margin-bottom: 12px;
      padding: 0 2px;
      line-height: 1.5;
      min-height: 34px;
    }

    .meta-note {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(29, 155, 240, 0.2);
      background: rgba(29, 155, 240, 0.08);
      color: #c9d6df;
      font-size: 12px;
      line-height: 1.5;
    }

    .buttons-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn {
      padding: 11px;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      flex: 1;
      background: #1d9bf0;
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { background: #1a8cd8; }

    .btn-secondary {
      background: #2f3336;
      color: #fff;
      padding: 11px 16px;
    }

    .btn-secondary:hover:not(:disabled) { background: #3e4144; }

    .progress {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
      color: #8b98a5;
    }

    .progress.show { display: flex; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #2f3336;
      border-top-color: #1d9bf0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result {
      display: none;
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      padding: 8px;
      border-radius: 8px;
    }

    .result.success { display: block; background: rgba(0, 186, 124, 0.15); color: #00ba7c; }
    .result.error { display: block; background: rgba(244, 33, 46, 0.15); color: #f4212e; }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #536471;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <h1>X Markdown Exporter</h1>
  </div>

  <div class="status loading" id="status">
    <div class="status-dot"></div>
    <span>检测中...</span>
    <b class="status-type" id="statusKind">其他</b>
  </div>

  <div class="section-title">下载格式</div>
  <div class="mode-selector" id="modeSelector">
    <button class="mode-btn" data-mode="link">链接引用</button>
    <button class="mode-btn active" data-mode="embed">内嵌图片</button>
    <button class="mode-btn" data-mode="zip">ZIP 打包</button>
  </div>
  <div class="mode-desc" id="modeDesc">图片压缩后以内嵌方式写入 Markdown，单文件保存更省心。</div>

  <div class="meta-note">
    导出时默认附带作者和时间，界面先保持精简，下载时直接带上。
  </div>

  <div class="buttons-row">
    <button class="btn btn-primary" id="downloadBtn" disabled>下载 Markdown</button>
    <button class="btn btn-secondary" id="copyBtn" disabled>复制</button>
    <button class="btn btn-secondary" id="refreshBtn" title="刷新页面">刷新</button>
  </div>

  <div class="progress" id="progress">
    <div class="spinner"></div>
    <span id="progressText">正在提取内容...</span>
  </div>
  <div class="result" id="result"></div>

  <div class="footer">v1.6.0</div>

  <script src="popup.js"></script>
</body>
</html>
